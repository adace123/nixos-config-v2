name: Build Raspberry Pi SD Image
on:
  workflow_dispatch:
    inputs:
      host:
        description: "NixOS configuration to build"
        default: "coruscant"
        type: string
  push:
    tags:
      - "build-sd-*"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          flakehub: false
          extra-conf: |
            extra-platforms = aarch64-linux
            sandbox = false
            extra-trusted-substituters = https://nixos-raspberrypi.cachix.org
            extra-trusted-public-keys = nixos-raspberrypi.cachix.org-1:4iMO9LXa8BqhU+Rpg6LQKiGa2lsNh/j2oiYLNOQ5sPI=
      - name: Enable aarch64-linux emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Build SD image
        run: |
          nix build .#nixosConfigurations.${{ inputs.host || 'coruscant' }}-sd-image.config.system.build.sdImage \
            --system aarch64-linux \
            --print-build-logs \
            --accept-flake-config
      - name: Compress image
        run: |
          mkdir -p /tmp/artifact
          cp result/sd-image/*.img.zst /tmp/artifact/
      - name: Upload image
        uses: actions/upload-artifact@v7
        with:
          name: nixos-sd-image-${{ inputs.host || 'coruscant' }}
          path: /tmp/artifact/*.img.zst
          retention-days: 7
