name: Build Raspberry Pi SD Image
on:
  workflow_dispatch:
    inputs:
      host:
        description: "NixOS configuration to build"
        default: "coruscant"
        type: string
  push:
    tags:
      - "build-sd-*"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          flakehub: false
      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v9
      - name: Enable aarch64-linux emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Configure binfmt for Nix
        run: |
          sudo bash -c 'echo ":aarch64-linux:M::\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xb7\x00:\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/run/binfmt/qemu-aarch64:C" > /proc/sys/fs/binfmt_misc/register' || true
      - name: Build SD image
        run: |
          nix build .#nixosConfigurations.${{ inputs.host || 'coruscant' }}-sd-image.config.system.build.sdImage \
            --system aarch64-linux \
            --print-build-logs
      - name: Compress image
        run: |
          mkdir -p /tmp/artifact
          cp result/sd-image/*.img.zst /tmp/artifact/
      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: nixos-sd-image-${{ inputs.host || 'coruscant' }}
          path: /tmp/artifact/*.img.zst
          retention-days: 7
