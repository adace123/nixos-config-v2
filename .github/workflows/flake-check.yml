name: Flake Checks
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          flakehub: false
      - name: Flake eval smoke check
        run: nix flake show
  linux-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          flakehub: false
      - name: Check Nix flake (Linux)
        run: nix flake check
  darwin-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          flakehub: false
      - name: Check Nix flake (Darwin)
        run: nix flake check
