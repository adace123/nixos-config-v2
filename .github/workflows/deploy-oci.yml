name: Build and Deploy OCI Image
"on":
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply after planning"
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-oci.yml
      - flake.nix
      - flake.lock
      - flake-parts/**
      - hosts/dathomir/**
      - infra/**
      - modules/nixos/**
      - secrets/oci.yaml
permissions:
  contents: read
concurrency:
  group: oci-deploy
  cancel-in-progress: false
env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
jobs:
  build-image:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - name: Enable KVM access
        run: |
          if [ -e /dev/kvm ]; then
            echo "KVM available"
            sudo chmod 666 /dev/kvm
          else
            echo "KVM not available (will fall back to emulation)"
          fi
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          flakehub: false
          extra-conf: |
            system-features = kvm benchmark big-parallel nixos-test uid-range
      - name: Build NixOS OCI image
        run: nix develop .#infra -c just build-image
        working-directory: infra
      - name: Stage image artifact
        run: |
          mkdir -p /tmp/oci-image
          cp -L result/nixos.qcow2 /tmp/oci-image/nixos.qcow2
        working-directory: infra
      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: nixos-oci-image
          path: /tmp/oci-image/nixos.qcow2
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
  plan:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup SOPS age key
        run: |
          echo "${{ secrets.SOPS_AGE_KEY }}" > /tmp/age-key.txt
          chmod 600 /tmp/age-key.txt
          echo "SOPS_AGE_KEY_FILE=/tmp/age-key.txt" >> "$GITHUB_ENV"
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          flakehub: false
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: nixos-oci-image
          path: infra/result
      - name: Debug - check sops decrypt
        working-directory: infra
        run: nix develop "${{ github.workspace }}#infra" -c sh -c 'echo "=== CWD ===" && pwd && echo "=== files ===" && ls -la ../secrets/ && echo "=== sops test ===" && sops -d --verbose ../secrets/oci.yaml 2>&1 | head -3 || sops -d ../secrets/oci.yaml 2>&1 | head -3'
      - name: OpenTofu Init
        working-directory: infra
        run: nix develop "${{ github.workspace }}#infra" -c sops exec-env "${{ github.workspace }}/secrets/oci.yaml" ./tofu-env.sh init
      - name: OpenTofu Plan
        working-directory: infra
        run: nix develop "${{ github.workspace }}#infra" -c sops exec-env "${{ github.workspace }}/secrets/oci.yaml" ./tofu-env.sh tofu plan -input=false -no-color
  apply:
    needs:
      - build-image
      - plan
    if: >-
      github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply)
    runs-on: ubuntu-latest
    environment: oci-production
    steps:
      - uses: actions/checkout@v7
      - name: Setup SOPS age key
        run: |
          echo "${{ secrets.SOPS_AGE_KEY }}" > /tmp/age-key.txt
          chmod 600 /tmp/age-key.txt
          echo "SOPS_AGE_KEY_FILE=/tmp/age-key.txt" >> "$GITHUB_ENV"
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          flakehub: false
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: nixos-oci-image
          path: infra/result
      - name: OpenTofu Init
        working-directory: infra
        run: nix develop "${{ github.workspace }}#infra" -c sops exec-env "${{ github.workspace }}/secrets/oci.yaml" ./tofu-env.sh init
      - name: OpenTofu Plan
        working-directory: infra
        run: nix develop "${{ github.workspace }}#infra" -c sops exec-env "${{ github.workspace }}/secrets/oci.yaml" ./tofu-env.sh tofu plan -input=false -out=tfplan
      - name: OpenTofu Apply
        working-directory: infra
        run: nix develop "${{ github.workspace }}#infra" -c sops exec-env "${{ github.workspace }}/secrets/oci.yaml" ./tofu-env.sh tofu apply -input=false tfplan
