version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
    automerge: true
    automerge-type: squash
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Los_Angeles"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(flake)"
    automerge: true
    automerge-type: squash
    groups:
      flake-input-updates:
        applies-to: version-updates
        patterns:
          - "*"
