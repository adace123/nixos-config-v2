default_config:
automation ui: !include automations.yaml
scene ui: !include scenes.yaml
script ui: !include scripts.yaml
http:
  server_host: "127.0.0.1"
  server_port: 8123
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1
logger:
  default: info
  logs:
    homeassistant: info
    homeassistant.components: warning
recorder:
  purge_keep_days: 10
  db_url: sqlite:////config/home-assistant_v2.db
history:
logbook:
sun:
system_health:
frontend:
config:
mobile_app:
discovery:
zeroconf:
homeassistant:
  name: Coruscant
  latitude: 34.05
  longitude: -118.24
  elevation: 71
  unit_system: metric
  time_zone: __TIME_ZONE__
  external_url: __EXTERNAL_URL__
  internal_url: __EXTERNAL_URL__
