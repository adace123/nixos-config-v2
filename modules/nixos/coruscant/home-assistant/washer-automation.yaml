- id: "washer_monitor"
  alias: "Washer Monitor"
  description: "Detect washer start/done using Third Reality vibration sensor"
  mode: "single"
  trigger:
    - platform: state
      id: "started"
      entity_id: binary_sensor.washer_vibration
      from: "off"
      to: "on"
    - platform: state
      id: "done"
      entity_id: binary_sensor.washer_vibration
      from: "on"
      to: "off"
      for:
        minutes: 15
    - platform: numeric_state
      id: "battery_low"
      entity_id: sensor.washer_battery_level
      below: 10
      for:
        minutes: 5
  action:
    - choose:
        - conditions:
            - condition: trigger
              id: "started"
            - condition: state
              entity_id: input_boolean.washer_running
              state: "off"
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.washer_running
            - action: persistent_notification.create
              data:
                title: "Washer Started"
                message: "The washing machine has started its cycle."
            - action: notify.washer_notifications
              data:
                title: "Washer Started"
                message: "The washing machine has started its cycle."
        - conditions:
            - condition: trigger
              id: "done"
            - condition: state
              entity_id: input_boolean.washer_running
              state: "on"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.washer_running
            - action: persistent_notification.create
              data:
                title: "Washer Done"
                message: "The washing machine has finished its cycle."
            - action: notify.washer_notifications
              data:
                title: "Washer Done"
                message: "The washing machine has finished its cycle."
            - action: notify.everywhere_announce
              data:
                message: "The washing machine has finished its cycle. Please move the clothes to the dryer."
        - conditions:
            - condition: trigger
              id: "battery_low"
          sequence:
            - action: persistent_notification.create
              data:
                title: "Washer Sensor Battery Low"
                message: "Replace the washer vibration sensor battery."
            - action: notify.washer_notifications
              data:
                title: "Washer Sensor Battery Low"
                message: "Replace the washer vibration sensor battery."
