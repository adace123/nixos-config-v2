default_config:
http:
  server_host: "0.0.0.0"
  server_port: 8123
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1
logger:
  default: info
  logs:
    homeassistant: info
    homeassistant.components: warning
recorder:
  purge_keep_days: 10
  db_url: sqlite:////config/home-assistant_v2.db
history:
logbook:
sun:
system_health:
frontend:
config:
mobile_app:
notify:
  - platform: group
    name: washer_notifications
    services:
      - service: mobile_app_aaron_cell
zeroconf:
homeassistant:
  name: Coruscant
  latitude: 34.05
  longitude: -118.24
  elevation: 71
  unit_system: metric
  time_zone: __TIME_ZONE__
  external_url: https://__EXTERNAL_DOMAIN__
  internal_url: https://__EXTERNAL_DOMAIN__
input_boolean:
  washer_battery_alerted:
    name: "Washer Battery Low Alerted"
    initial: off
template:
  - binary_sensor:
      - name: "Washer Cleaning State"
        state: >
          {{ is_state('binary_sensor.washer_vibration', 'on') }}

        delay_off:
          minutes: 15
        delay_on:
          seconds: 30
automation: !include_dir_merge_list automations/
script: !include_dir_merge_named scripts/
scene: !include_dir_merge_list scenes/
